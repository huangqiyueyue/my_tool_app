name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install iOS dependencies
        run: |
          flutter pub get
          cd ios
          pod install
          cd ..

      - name: Build iOS for simulator (without signing)
        run: |
          flutter build ios --simulator --no-codesign

      - name: Build iOS IPA (requires code signing)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          flutter build ios --release --no-codesign
        continue-on-error: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ios-build
          path: |
            build/ios/iphonesimulator/Runner.app
            build/ios/iphoneos/Runner.app
            build/ios/iphonesimulator/Runner.ipa
            build/ios/iphoneos/Runner.ipa
          retention-days: 7

      - name: Upload debug symbols
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ios-debug-symbols
          path: |
            build/ios/iphoneos/Runner.app.dSYM
          retention-days: 7

  build_android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4.3.3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 7