name: Build Flutter Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.3.0

      - name: Setup Java JDK
        uses: actions/setup-java@v4.5.0
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.10.0
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Show pubspec.yaml
        run: cat pubspec.yaml

      - name: Build APK
        run: flutter build apk --debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4.3.3
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-debug.apk

  build_ios:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4.3.0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.10.0
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Show Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Show pubspec.yaml
        run: cat pubspec.yaml

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --verbose
          cd ..

      - name: Build iOS simulator
        run: flutter build ios --simulator --no-codesign --verbose

      - name: Upload iOS app
        uses: actions/upload-artifact@v4.3.3
        with:
          name: ios-simulator-app
          path: build/ios/iphonesimulator/Runner.app