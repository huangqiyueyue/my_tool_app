name: Build Flutter Apps

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_mode:
        description: 'Build mode'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.10.0
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK (Release)
        if: github.event.inputs.build_mode == 'release' || github.event_name != 'workflow_dispatch'
        run: flutter build apk --release

      - name: Build Android APK (Debug)
        if: github.event.inputs.build_mode == 'debug'
        run: flutter build apk --debug

      - name: List Android build outputs
        run: ls -la build/app/outputs/flutter-apk/ 2>/dev/null || ls -la build/app/outputs/ 2>/dev/null || echo "Checking other locations..." && find build -name "*.apk" 2>/dev/null | head -5

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk

  build_ios:
    runs-on: macos-14
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.10.0
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS (Release)
        if: github.event.inputs.build_mode == 'release' || github.event_name != 'workflow_dispatch'
        run: flutter build ios --release --no-codesign

      - name: Build iOS (Debug)
        if: github.event.inputs.build_mode == 'debug'
        run: flutter build ios --debug --no-codesign

      - name: List iOS build outputs
        run: ls -la build/ios/ 2>/dev/null && find build/ios -name "*.app" -type d 2>/dev/null | head -5

      - name: Upload iOS app
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: build/ios/iphoneos/